<!DOCTYPE html>

<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>B.Ed Vault</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

:root{
--primary:#3b82f6;
--bg:#f4f7fb;
--card:#ffffff;
--text:#1f2937;
--shadow:0 10px 25px rgba(0,0,0,0.08);
}

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Segoe UI,Arial;
}

body{
background:var(--bg);
color:var(--text);
}

/* HEADER */

header{
background:var(--primary);
color:white;
padding:16px;
font-size:20px;
font-weight:600;
text-align:center;
}

/* LOGIN */

.login{
max-width:400px;
margin:60px auto;
background:white;
padding:25px;
border-radius:12px;
box-shadow:var(--shadow);
}

.login input,
.login select{
width:100%;
padding:12px;
margin-bottom:12px;
border-radius:8px;
border:1px solid #ddd;
}

.login button{
width:100%;
padding:12px;
background:var(--primary);
color:white;
border:none;
border-radius:8px;
font-weight:600;
cursor:pointer;
}

/* PAGE */

.page{
display:none;
max-width:800px;
margin:auto;
padding:18px;
padding-bottom:90px;
}

.page.active{
display:block;
}

/* SEARCH */

.search{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #ddd;
margin-bottom:12px;
}

/* CARD */

.card{
background:var(--card);
border-radius:12px;
padding:14px;
margin-bottom:12px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:var(--shadow);
}

.btn{
background:var(--primary);
color:white;
border:none;
padding:8px 14px;
border-radius:8px;
cursor:pointer;
}

/* PDF VIEWER */

.viewer{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
z-index:999;
}

.viewer iframe{
width:100%;
height:100%;
border:none;
}

.close{
position:absolute;
top:10px;
right:10px;
background:white;
padding:6px 12px;
border-radius:6px;
cursor:pointer;
}

/* NAV */

.nav{
position:fixed;
bottom:0;
left:0;
width:100%;
background:white;
border-top:1px solid #ddd;
display:flex;
justify-content:space-around;
padding:10px 0;
}

.nav button{
background:none;
border:none;
font-size:12px;
display:flex;
flex-direction:column;
align-items:center;
position:relative;
}

.nav i{
font-size:18px;
margin-bottom:3px;
}

/* BADGE */

.badge{
position:absolute;
top:-4px;
right:6px;
background:red;
color:white;
font-size:10px;
padding:2px 6px;
border-radius:10px;
display:none;
}

/* NOTICE */

.noticeCard{
background:white;
border-radius:12px;
padding:14px;
margin-bottom:12px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:var(--shadow);
border-left:4px solid var(--primary);
}

.noticeCard.new{
border-left:4px solid red;
background:#fff5f5;
}

</style>

</head>

<body>

<header>
<i class="fa-solid fa-graduation-cap"></i>
B.Ed Vault
</header>

<!-- LOGIN -->

<div id="loginPage" class="login">

<h2 style="text-align:center;margin-bottom:15px;">
Login
</h2>

<input id="name" placeholder="Your Name">

<select id="semester">
<option value="">Select Semester</option>
<option>Semester 1</option>
<option>Semester 2</option>
<option>Semester 3</option>
<option>Semester 4</option>
</select>

<button onclick="sendLogin()">
Login via WhatsApp
</button>

</div>

<!-- HOME -->

<div id="home" class="page">

<div class="card">
<div>
<i class="fa-solid fa-book"></i>
Study Notes
</div>

<button class="btn" onclick="showPage('notes')">
Open
</button>

</div>

<div class="card">
<div>
<i class="fa-solid fa-bell"></i>
TNTEU Updates
</div>

<button class="btn" onclick="showPage('notices')">
Open
</button>

</div>

</div>

<!-- NOTES -->

<div id="notes" class="page">

<h3 id="semTitle"></h3>

<input
class="search"
id="search"
placeholder="Search notes..."
onkeyup="searchNotes()"

>

<div id="noteList"></div>

</div>

<!-- NOTICES -->

<div id="notices" class="page">

<h3>TNTEU Notifications</h3>

<div id="noticeList">Loading...</div>

</div>

<!-- PDF VIEWER -->

<div class="viewer" id="viewer">

<div class="close" onclick="closePDF()">
Close
</div>

<iframe id="frame"></iframe>

</div>

<!-- NAV -->

<div class="nav">

<button onclick="showPage('home')">
<i class="fa-solid fa-house"></i>
Home
</button>

<button onclick="showPage('notes')">
<i class="fa-solid fa-book"></i>
Notes
</button>

<button onclick="showPage('notices')" style="position:relative">
<i class="fa-solid fa-bell"></i>
Updates
<span id="noticeBadge" class="badge">1</span>
</button>

</div>

<script>

/* LOGIN */

function sendLogin(){

let name=document.getElementById("name").value
let semester=document.getElementById("semester").value

if(!name || !semester){

alert("Fill all details")
return

}

localStorage.setItem("semester",semester)
localStorage.setItem("logged","yes")

let msg=
`B.Ed Vault Login

Name: ${name}
Semester: ${semester}

Please activate.`

let url="https://wa.me/919655969516?text="+encodeURIComponent(msg)

window.open(url)

location.reload()

}

/* CHECK LOGIN */

if(localStorage.getItem("logged")){

loginPage.style.display="none"
home.classList.add("active")

}

/* NOTES DATA */

const base="pdfs/"

const books=[

{sem:"Semester 1",title:"BD1CE Unit 1 ENG",file:"BD1CE Unit-1 ENG.pdf"},
{sem:"Semester 1",title:"BD1CE Unit 2 ENG",file:"BD1CE Unit-2 ENG.pdf"},

{sem:"Semester 2",title:"BD2EE Unit 1 TAM",file:"BD2EE Unit-1.pdf"}

]

let userSem=localStorage.getItem("semester")

document.getElementById("semTitle").innerText=userSem+" Notes"

let list=document.getElementById("noteList")

books.forEach(b=>{

if(b.sem!==userSem) return

list.innerHTML+=`

<div class="card">

<div>

<i class="fa-solid fa-file-pdf" style="color:#e11d48"></i>

${b.title}

</div>

<button class="btn" onclick="openPDF('${b.file}')">
Open
</button>

</div>

`

})

/* SEARCH */

function searchNotes(){

let s=document.getElementById("search").value.toLowerCase()

document.querySelectorAll("#noteList .card").forEach(c=>{

c.style.display=c.innerText.toLowerCase().includes(s)?"flex":"none"

})

}

/* PDF VIEWER */

function openPDF(file){

viewer.style.display="block"

frame.src=base+file

}

function closePDF(){

viewer.style.display="none"

frame.src=""

}

/* PAGE SWITCH */

function showPage(p){

document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"))

document.getElementById(p).classList.add("active")

if(p==="notices"){
noticeBadge.style.display="none"
}

}

/* TNTEU NOTIFICATIONS */

async function loadNotices(){

const proxy="https://api.codetabs.com/v1/proxy/?quest="

const target="https://www.tnteu.ac.in/notifications.php?nid=5"

try{

const res=await fetch(proxy+encodeURIComponent(target))
const html=await res.text()

const doc=new DOMParser().parseFromString(html,"text/html")

const links=doc.querySelectorAll(".sectionWrapper a")

let output=""
let saved=localStorage.getItem("lastNotice")
let first=""

links.forEach((a,i)=>{

if(i>12)return

let title=a.innerText.trim()

let url="https://www.tnteu.ac.in/"+a.getAttribute("href")

if(i===0) first=title

let isNew=(saved && saved!==title && i===0)

output+=`

<div class="noticeCard ${isNew?'new':''}">

<div>

<i class="fa-solid fa-bullhorn"></i>
${title}
${isNew?'<span style="color:red;font-size:11px;margin-left:6px">NEW</span>':''}

</div>

<button class="btn" onclick="window.open('${url}')">
Open
</button>

</div>

`

})

noticeList.innerHTML=output

if(saved && saved!==first){
noticeBadge.style.display="block"
}

localStorage.setItem("lastNotice",first)

}catch{

noticeList.innerHTML="Unable to load notifications."

}

}

loadNotices()

</script>

</body>
</html>
