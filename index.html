<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>B.Ed Vault</title>

<style>

*{box-sizing:border-box}

body{
margin:0;
font-family:Inter,Segoe UI,Arial;
background:#eef2f6;
}

/* HEADER */

.header{
background:#42A5F5;
color:white;
padding:16px;
font-size:20px;
font-weight:600;
text-align:center;
position:sticky;
top:0;
z-index:100;
}

/* CONTAINER */

.container{
max-width:800px;
margin:auto;
padding:18px;
}

/* SEARCH */

#search{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #ddd;
margin-bottom:18px;
font-size:15px;
}

/* SEMESTER */

.sem{
font-weight:600;
font-size:16px;
padding:10px 4px;
margin-top:12px;
color:#444;
}

/* FILE CARD */

.card{
display:flex;
justify-content:space-between;
align-items:center;
padding:14px;
border-radius:10px;
background:#fafafa;
border:1px solid #eee;
margin-bottom:10px;
}

.card:hover{
background:#f3f7ff;
}

.card small{
font-size:12px;
color:#777;
}

/* BUTTON */

.btn{
background:#42A5F5;
color:white;
border:none;
padding:8px 16px;
border-radius:8px;
cursor:pointer;
font-size:14px;
}

.btn:hover{
background:#1e88e5;
}

/* VIEWER */

.viewer{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
z-index:9999;
}

.viewer iframe{
width:100%;
height:100%;
border:none;
}

.close{
position:absolute;
top:10px;
right:10px;
background:white;
padding:6px 12px;
border-radius:6px;
cursor:pointer;
font-size:14px;
}

/* INTERNET POPUP */

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:none;
align-items:center;
justify-content:center;
z-index:10000;
}

.popupBox{
background:white;
padding:20px;
border-radius:10px;
width:260px;
text-align:center;
}

.popupTitle{
font-weight:bold;
font-size:18px;
margin-bottom:10px;
}

.popupText{
font-size:14px;
margin-bottom:15px;
}

.popup button{
background:#42A5F5;
color:white;
border:none;
padding:8px 16px;
border-radius:6px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="header">B.Ed Vault</div>

<div class="container">

<input id="search" placeholder="Search materials..." onkeyup="search()">

<div id="list"></div>

</div>

<div class="viewer" id="viewer">
<div class="close" onclick="closePDF()">Close</div>
<iframe id="frame"></iframe>
</div>

<!-- INTERNET POPUP -->

<div id="internetPopup" class="popup">
<div class="popupBox">
<div class="popupTitle">Internet Required</div>
<div class="popupText">Please turn on internet to download this file.</div>
<button onclick="closePopup()">Close</button>
</div>
</div>

<script>

const baseURL="PDFs/"

const books=[

["First Semester"],

["BD1CE Unit-1 ENG","Nagarajan","BD1CE Unit-1 ENG.pdf"],
["BD1CE Unit-2 ENG","Nagarajan","BD1CE Unit-2 ENG.pdf"],
["BD1CE Unit-3 ENG","Nagarajan","BD1CE Unit-3 ENG.pdf"],

["Second Semester"],

["BD2EE Unit-1 TAM","Nagarajan","BD2EE Unit-1.pdf"]

]

let container=document.getElementById("list")

books.forEach((b,i)=>{

if(b.length==1){

container.innerHTML+=`<div class="sem">${b[0]}</div>`

}else{

let url=baseURL+encodeURIComponent(b[2])
let id="file"+i

let status=localStorage.getItem(id)

let text=status?"Open":"Download"

container.innerHTML+=`

<div class="card">

<div>
<div>${b[0]}</div>
<small>${b[1]}</small>
</div>

<button class="btn"
data-id="${id}"
data-url="${url}"
onclick="handleBtn(this)">
${text}
</button>

</div>

`

}

})

function search(){

let s=document.getElementById("search").value.toLowerCase()

document.querySelectorAll(".card").forEach(c=>{

c.style.display=
c.innerText.toLowerCase().includes(s)
?"flex":"none"

})

}

function handleBtn(btn){

let id=btn.dataset.id
let url=btn.dataset.url

if(localStorage.getItem(id)){

openPDF(url)
return

}

/* CHECK INTERNET */

if(!navigator.onLine){

document.getElementById("internetPopup").style.display="flex"
return

}

/* FAKE DOWNLOAD */

btn.innerText="Downloading..."
btn.disabled=true

setTimeout(()=>{

localStorage.setItem(id,"true")

btn.innerText="Open"
btn.disabled=false

openPDF(url)

},1000)

}

function openPDF(url){

let viewer="web/viewer.html?file="+url

document.getElementById("viewer").style.display="block"

document.getElementById("frame").src=viewer

}

function closePDF(){

document.getElementById("viewer").style.display="none"

document.getElementById("frame").src=""

}

function closePopup(){

document.getElementById("internetPopup").style.display="none"

}

</script>

</body>
</html>
